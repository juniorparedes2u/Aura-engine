    function base64ToArrayBuffer(base64) {
      const binaryString = window.atob(base64);
      const len = binaryString.length;
      const bytes = new Uint8Array(len);
      for (let i = 0; i < len; i++) {
        bytes[i] = binaryString.charCodeAt(i);
      }
      return bytes.buffer;
    }

    function writeString(view, offset, string) {
      for (let i = 0; i < string.length; i++) {
        view.setUint8(offset + i, string.charCodeAt(i));
      }
    }

    function pcmToWav(pcm16Array, sampleRate) {
      const buffer = new ArrayBuffer(44 + pcm16Array.length * 2);
      const view = new DataView(buffer);
      
      writeString(view, 0, 'RIFF');
      view.setUint32(4, 36 + pcm16Array.length * 2, true);
      writeString(view, 8, 'WAVE');
      writeString(view, 12, 'fmt ');
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true); // Linear PCM
      view.setUint16(22, 1, true); // Mono channel
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * 2, true); // Byte rate
      view.setUint16(32, 2, true); // Block align
      view.setUint16(34, 16, true); // 16 bits
      writeString(view, 36, 'data');
      view.setUint32(40, pcm16Array.length * 2, true);

      let offset = 44;
      for (let i = 0; i < pcm16Array.length; i++, offset += 2) {
        view.setInt16(offset, pcm16Array[i], true);
      }

      return new Blob([buffer], { type: 'audio/wav' });
    }

    async function fetchWithBackoff(url, options, retries = 3, delay = 1000) {
      try {
        const response = await fetch(url, options);
        if (!response.ok) {
          if (response.status === 403) {
            throw new Error("API_KEY_INVALID");
          }
          if (response.status === 429) {
            if (retries > 0) {
              await new Promise(res => setTimeout(res, delay));
              return fetchWithBackoff(url, options, retries - 1, delay * 2);
            }
            throw new Error("RATE_LIMIT_EXCEEDED");
          }
          throw new Error(`Error HTTP: ${response.status}`);
        }
        return response;
      } catch (err) {
        if (err.message === "API_KEY_INVALID" || err.message === "RATE_LIMIT_EXCEEDED") {
          throw err; // No reintentar indefinidamente si la clave está bloqueada o superó límite
        }
        if (retries > 0) {
          await new Promise(res => setTimeout(res, delay));
          return fetchWithBackoff(url, options, retries - 1, delay * 2);
        }
        throw err;
      }
    }

          ${isRoundTrip ? `- Return Date: ${returnDate} (This is a Round-trip flight)` : '- One-way flight only'}
          - Number of Passengers: ${passengers} (Ensure total prices calculated reflect ${passengers} passenger tickets)
          - Hand Luggage (Carry-on): ${hasHandLuggage ? 'Included in fare' : 'Basic economy fare, no carry-on included (personal item only)'}
          - Maximum total price budget for all passengers: ${budget} USD.

          Return EXACTLY this JSON structure without any markdown wrappers or backticks:
          [
            {
              "airline": "Name of Airline",
              "flightNumber": "Outbound Flight designation",
              "returnFlightNumber": "Return Flight designation or null",

              "durationOutbound": "10h 30m",

              "stops": 0,
              "bookingLink": "Direct URL to booking page or airline homepage"
            }
          ]`;

          try {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
              contents: [{ parts: [{ text: prompt }] }],
              tools: [{ "google_search": {} }],
              systemInstruction: {
                parts: [{ text: "Act as an ultra-high speed travel agency parser. Return strictly pure JSON arrays with no markdown formatting. Ensure prices are realistic and bookingLinks point to valid sites." }]
              }
            };

            const response = await fetchWithBackoff(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },

            });

            const data = await response.json();
            const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
            const cleanedJsonText = textResponse.replace(/```json|```/gi, '').trim();
            const parsedFlights = JSON.parse(cleanedJsonText);
            
            if (Array.isArray(parsedFlights) && parsedFlights.length > 0) {
              const structuralFlights = parsedFlights.map(f => ({
                ...f,
                bookingLink: f.bookingLink && f.bookingLink.startsWith('http') ? f.bookingLink : generateDeepLink(cleanOrigin, cleanDestination, departureDate, isRoundTrip ? returnDate : '', f.airline, isRoundTrip, passengers)

              setFlights(structuralFlights);
              addLog('SYS', `Búsqueda IA completada. Encontrados ${structuralFlights.length} boletos.`);
              setApiUsage(prev => ({ ...prev, used: prev.used + 1 }));
            } else {
              throw new Error('Formato JSON incorrecto');
            }

          } catch (err) {

              errorMsg = "API Key incorrecta (403)";

            } else if (err.message === "RATE_LIMIT_EXCEEDED") {
              errorMsg = "Cuota excedida (429)";
              showToast('Límite de solicitudes Gemini superado. Cambiando a búsqueda offline.', 'warning');
            } else {
              showToast('Error al conectar con la IA de Gemini. Usando motor local.', 'warning');
            }
            addLog('WRN', `Activando failover determinista de vuelos por error de red/cuota: ${errorMsg}`);
            executeDeterministicFallback(cleanOrigin, cleanDestination);
          }
        } else {
          addLog('SYS', 'Modo Local determinista activado.');
          executeDeterministicFallback(cleanOrigin, cleanDestination);
        }
        setLoading(false);
      };

      const executeDeterministicFallback = (from, to) => {
        const mockAirlines = [
          { name: 'Iberia', code: 'IB', basePrice: 620, durationOutbound: '11h 15m', durationInbound: '11h 05m', stops: 0 },
          { name: 'Aeroméxico', code: 'AM', basePrice: 710, durationOutbound: '11h 20m', durationInbound: '11h 10m', stops: 0 },
          { name: 'Lufthansa', code: 'LH', basePrice: 850, durationOutbound: '14h 45m', durationInbound: '14h 20m', stops: 1 },
          { name: 'United Airlines', code: 'UA', basePrice: 510, durationOutbound: '15h 10m', durationInbound: '15h 30m', stops: 1 }
        ];

        const results = mockAirlines.map((airline, idx) => {
          const variance = Math.sin(idx + 1) * 80;
          let calculatedPrice = airline.basePrice + variance;
          
          calculatedPrice = calculatedPrice * passengers;
          
          if (isRoundTrip) {
            calculatedPrice = calculatedPrice * 1.85; 
          }

          if (hasHandLuggage) {
            calculatedPrice += (35 * passengers * (isRoundTrip ? 2 : 1));
          }

          const finalPrice = Math.round(calculatedPrice);

          return {
            airline: airline.name,
            flightNumber: `${airline.code}${Math.floor(Math.random() * 800) + 100}`,
            returnFlightNumber: isRoundTrip ? `${airline.code}${Math.floor(Math.random() * 800) + 100}` : null,
            price: finalPrice,
            durationOutbound: airline.durationOutbound,
            durationInbound: isRoundTrip ? airline.durationInbound : null,
            stops: airline.stops,
            bookingLink: generateDeepLink(from, to, departureDate, isRoundTrip ? returnDate : '', airline.code, isRoundTrip, passengers)
          };
        }).filter(f => f.price <= budget);

        setFlights(results);
        addLog('SYS', `Failover completado. Encontradas ${results.length} opciones adaptadas para ${passengers} pasajero(s).`);
      };

      const handleGenerateTTS = async (flight) => {

          showToast('Ingresa tu Gemini API Key en el menú izquierdo para generar audioguías de voz.', 'warning');
          return;
        }

        setAudioLoading(true);
        if (audioUrl) {
          URL.revokeObjectURL(audioUrl);
          setAudioUrl(null);
        }
        addLog('AI', `Invocando modelo gemini-2.5-flash-preview-tts para audio de vuelo...`);

        const luggageText = hasHandLuggage ? 'with carry-on luggage included' : 'without hand luggage (personal item only)';
        const tripText = isRoundTrip ? `round-trip journey returning on ${returnDate}` : 'one-way flight';
        const spokenText = `Say cheerfully in a lively travel guide voice: Outstanding deal found! Fly from ${origin.city} to ${destination.city} with ${flight.airline}. This is a ${tripText} for ${passengers} traveler, ${luggageText}. Your total budget friendly price is ${flight.price} dollars. Excellent choice!`;

        const payload = {
          contents: [{ parts: [{ text: spokenText }] }],
          generationConfig: {
            responseModalities: ["AUDIO"],
            speechConfig: {
              voiceConfig: {
                prebuiltVoiceConfig: { voiceName: voiceSelected }
              }
            }
          }
        };

        try {
          const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`;
          const response = await fetchWithBackoff(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });

          const result = await response.json();
          const part = result?.candidates?.[0]?.content?.parts?.[0];
          const rawAudio = part?.inlineData?.data;
          const mimeType = part?.inlineData?.mimeType;

          if (rawAudio && mimeType && mimeType.startsWith("audio/")) {
            const rateMatch = mimeType.match(/rate=(\d+)/);
            const sampleRate = rateMatch ? parseInt(rateMatch[1], 10) : 24000;
            
            const pcmData = base64ToArrayBuffer(rawAudio);
            const pcm16 = new Int16Array(pcmData);
            const wavBlob = pcmToWav(pcm16, sampleRate);
            const urlObj = URL.createObjectURL(wavBlob);
            
            setAudioUrl(urlObj);
            addLog('SYS', `Audio de IA generado exitosamente. Frecuencia: ${sampleRate}Hz`);
            showToast('Audioguía de vuelo lista.', 'success');

            throw new Error("Respuesta de audio vacía o errónea");

      return (

                  {/* IA Assistant Sub-Panels */}

                      {audioUrl ? (
                        <div className="bg-slate-950 p-2.5 rounded-lg border border-slate-800 flex items-center">
                          <audio ref={audioRef} src={audioUrl} controls className="w-full h-8 bg-slate-950" />

                      ) : (

                        type="submit" 
                        disabled={chatLoading}
                        className="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-bold px-3 py-1.5 rounded transition-all shrink-0"

                        &nbsp;&nbsp;FOR ALL TO public <br />

                        </div>

                        </div>
                        <div className="flex items-center justify-between border-b border-slate-900 pb-1.5">

                      <span className="text-xs font-bold uppercase tracking-wider text-slate-400 flex items-center gap-1.5 font-mono">

                      </span>
                      <button 
                        onClick={() => setLogs([])}
                        className="text-[10px] text-slate-500 hover:text-white underline"

                      </button>
                    </div>
                    
                    <div className="h-48 overflow-y-auto font-mono text-[11px] space-y-2 pr-2">
                      {logs.map((log, index) => (
                        <div key={index} className="flex gap-2 text-slate-400">
                          <span className="text-slate-600">[{log.timestamp}]</span>
                          <span className={`font-bold ${
                            log.type === 'SEC' ? 'text-emerald-400' : 
                            log.type === 'ERR' ? 'text-red-400' : 
                            log.type === 'AI' ? 'text-cyan-400' : 'text-slate-400'
                          }`}>
                            [{log.type}]
                          </span>
                          <span>{log.message}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>
              )}

              {/* Tab Stripe */}
              {activeTab === 'stripe' && (
                <div className="bg-slate-900 border border-slate-800 rounded-xl p-6 shadow-xl flex flex-col gap-6">

                    </p>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 flex flex-col justify-between">
                      <div>
                        <h3 className="text-sm font-bold text-slate-300">Plan Light Starter</h3>
                        <p className="text-slate-500 text-xs mt-1">Óptimo para buscadores ocasionales</p>
                        <span className="text-2xl font-black text-white font-mono mt-4 block">$19<span className="text-xs font-normal text-slate-500"> /mes</span></span>
                      </div>
                      <button 
                        onClick={() => addLog('SYS', 'Simulando redirección segura de Stripe Checkout para plan Starter (USD $19/mo)')}

                      >
                        Comprar con Stripe
                      </button>
                    </div>

                    <div className="bg-slate-950 p-5 rounded-xl border border-emerald-500/30 relative flex flex-col justify-between">
                      <span className="absolute -top-2 right-4 bg-emerald-500 text-slate-950 font-bold px-2 py-0.5 rounded text-[9px] uppercase tracking-wider font-mono">Popular</span>

                        <span className="text-2xl font-black text-white font-mono mt-4 block">$49<span className="text-xs font-normal text-slate-500"> /mes</span></span>
                      </div>
                      <button 
                        onClick={() => addLog('SYS', 'Simulando redirección segura de Stripe Checkout para plan Pro (USD $49/mo)')}
                        className="mt-6 w-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 py-2 rounded-lg text-xs font-bold transition-all shadow-lg shadow-emerald-500/10"

                        Comprar con Stripe

                    <div className="bg-slate-950 p-5 rounded-xl border border-slate-800 flex flex-col justify-between">
                      <div>

                        <p className="text-slate-500 text-xs mt-1">Deep linking con RLS dedicado</p>
                        <span className="text-2xl font-black text-white font-mono mt-4 block">$299<span className="text-xs font-normal text-slate-500"> /mes</span></span>
                      </div>
                      <button 
                        onClick={() => addLog('SYS', 'Simulando redirección segura de Stripe Checkout para plan Enterprise Custom (USD $299/mo)')}
                        className="mt-6 w-full bg-slate-900 hover:bg-slate-800 text-white border border-slate-800 py-2 rounded-lg text-xs font-bold transition-all"
                      >
                        Comprar con Stripe
                      </button>
                    </div>
                  </div>

                  <div className="bg-indigo-950/20 border border-indigo-500/20 rounded-xl p-5 text-xs text-slate-300">
                    <h4 className="font-bold text-white flex items-center gap-1.5 mb-2">
                      <Icon name="check" className="h-4 w-4 text-emerald-400" /> Idempotencia y Firma Webhook Estricta
                    </h4>
                    <p className="leading-relaxed">
                      Nuestra API para Webhooks de Stripe valida la firma HMAC del encabezado <code>Stripe-Signature</code> para prevenir usurpación de identidad. El sistema realiza un almacenamiento atómico en Redis usando la clave del evento para evitar doble aprovisionamiento de recursos ante reintentos de Stripe.
                    </p>
                  </div>
                </div>
              )}

            </div>
          </main>

          {/* Footer */}
          <footer className="border-t border-slate-900 bg-slate-950 px-6 py-4 text-xs text-slate-500 mt-8">
            <div className="max-w-7xl w-full mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
              <div>
                <p className="font-semibold text-slate-400">JetSaaS - Sovereign Engine Platform</p>
                <p className="mt-0.5">Construido para soportar Due Diligence de Adquisición en Serie A. EBITDA Certificado.</p>
              </div>
              <div className="flex gap-6">
                <a href="#privacy" className="hover:text-white transition-all">Política de Privacidad</a>
                <a href="#terms" className="hover:text-white transition-all">Términos del Servicio</a>
                <a href="#compliance" className="hover:text-white transition-all">Cumplimiento GDPR</a>

          </footer>

        </div>

    // Renderizar aplicación utilizando ReactDOM v18 compatible con browsers modernos
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
